sweep_yaml: sweep-deepm
save_directory: models_torch
project: dmn

use_lagged_cross_section: true
use_xatt: true
use_gnn: true

use_adamw: true

use_rezero_attn: true
use_rezero_gnn: true
rezero_init: 0.01
gat_concat_heads: true
use_single_head_spatial: false
gnn_weighted_edges: true
alpha_lr_mult: 100.0

no_bias_in_prediction_head: true

prediction_head_init: "default"
prediction_head_std:  0.001

grad_accum_hidden_threshold: 64

# --- Robustness objective (joint pooled Sharpe + softmin window Sharpe) ---
use_joint_pooled_softmin_sharpe: true
joint_softmin_lambda: 0.1
softmin_sharpe_beta: 1.0
softmin_sharpe_center: false

ticker_reference_file: futs_and_fx

data_parquet: "data_dec25.parquet"
use_correlation_features: false

test_run: false

train_valid_split: 0.9
seq_len: 84
pre_loss_steps: 21

iterations: 1000
random_search_max_iterations: 50
top_n_seeds: 10
early_stopping: 100
smooth_alpha: 0.26
min_delta: 0.02
val_burnin_steps: 50

optimise_loss_function: 0

use_transaction_costs: true
tcost_inputs: true
fixed_trans_cost_bp_loss: 0
volscale_tc_loss: true
turnover_regulariser_scaler: 0.5

features:
  - r1d
  - r1m
  - r3m
  - r1y
  - z_price_21d
  - z_price_252d

first_train_year: 1990
final_test_year: 2025
first_test_year: 2010
test_start_years:
  - 2010
  - 2015
  - 2020

